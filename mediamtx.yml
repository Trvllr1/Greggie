# MediaMTX config for Greggie Live Streaming
# Accepts RTMP from OBS, outputs HLS for browsers

###############################################
# General
logLevel: info
logDestinations: [stdout]

###############################################
# RTMP server (creators push from OBS)
rtmp: yes
rtmpAddress: :1935

###############################################
# HLS server (viewers play in browser)
hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: fmp4
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 50M

###############################################
# API (used by backend to check stream status)
api: yes
apiAddress: :9997

###############################################
# WHIP ingest (creators publish from browser via WebRTC)
webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcAdditionalHosts: [137.131.51.134]
webrtcLocalUDPAddress: :8189

###############################################
# Disable protocols we don't need
rtsp: no
srt: no

###############################################
# Paths — accept any stream key
paths:
  all_others:

###############################################
# Authentication (publish-only) via backend hook.
#
# IMPORTANT: This block is commented out by default. Enable AFTER deploying the
# backend with the /internal/streams/auth endpoint AND confirming MediaMTX version
# on the OCI box supports `authMethod: http` (v1.0+).
#
# To enable:
#   1. Uncomment the block below.
#   2. (Optional) Set MEDIAMTX_AUTH_TOKEN in backend .env and append ?token=<value> to authHTTPAddress.
#   3. Restart MediaMTX: `docker compose -f docker-compose.prod.yml restart mediamtx`
#   4. Test by trying to publish with a fake stream key — should reject; real key — should accept.
#
# Without this enabled, ANYONE who can reach :1935 (RTMP) or :8889 (WHIP) can publish
# to any path. Only the stream key path itself provides obscurity, which is not security.
#
# authMethod: http
# authHTTPAddress: http://backend:8080/internal/streams/auth
# authHTTPExclude:
#   - action: api
#   - action: metrics
#   - action: pprof
#   - action: read     # HLS playback is public — don't auth it
#   - action: playback
