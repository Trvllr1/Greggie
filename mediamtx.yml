# MediaMTX config for Greggie Live Streaming
# Accepts RTMP from OBS, outputs HLS for browsers

###############################################
# General
logLevel: info
logDestinations: [stdout]

###############################################
# RTMP server (creators push from OBS)
rtmp: yes
rtmpAddress: :1935

###############################################
# HLS server (viewers play in browser)
hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: fmp4
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 50M

###############################################
# API (used by backend to check stream status)
api: yes
apiAddress: :9997

###############################################
# WHIP ingest (creators publish from browser via WebRTC)
webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcAdditionalHosts: [137.131.51.134]
webrtcLocalUDPAddress: :8189

###############################################
# Disable protocols we don't need
rtsp: no
srt: no

###############################################
# Paths — accept any stream key
paths:
  all_others:

###############################################
# Authentication (publish-only) via backend hook.
#
# Validated 2026-05-17 on OCI VM: backend /internal/streams/auth rejects
# unknown stream keys (401 invalid stream key) and accepts real keys (200 OK).
# /internal/* is NOT exposed via Caddy; only mediamtx (same docker network)
# can reach the auth endpoint.
#
# Optional: set MEDIAMTX_AUTH_TOKEN in backend env and append ?token=<value>
# to authHTTPAddress for an extra shared-secret check.

authMethod: http
authHTTPAddress: http://backend:8080/internal/streams/auth
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof
  - action: read     # HLS playback is public — don't auth it
  - action: playback
