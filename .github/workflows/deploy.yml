name: Deploy to OCI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/migrations/**"
      - "docker-compose.prod.yml"
      - "docker-compose.arm.yml"
      - "infra/**"

  workflow_dispatch: # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          # OCI_HOST defaults to AMD instance; update to ARM IP when you migrate
          host: ${{ vars.OCI_HOST || '137.131.51.134' }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/greggie

            echo ">>> Pulling latest code..."
            git pull origin main

            # Detect architecture and pick compose files
            ARCH=$(uname -m)
            COMPOSE_CMD="docker compose -f docker-compose.prod.yml"
            if [ "$ARCH" = "aarch64" ]; then
              echo ">>> ARM instance detected — using ARM overrides"
              COMPOSE_CMD="$COMPOSE_CMD -f docker-compose.arm.yml"
            fi

            echo ">>> Building and deploying..."
            $COMPOSE_CMD build --no-cache backend
            $COMPOSE_CMD up -d

            echo ">>> Cleaning up old images..."
            docker image prune -f

            echo ">>> Checking health..."
            sleep 5
            curl -sf http://localhost:8080/health || echo "WARNING: health check failed"

            echo ">>> Deploy complete! (arch: $ARCH)"
